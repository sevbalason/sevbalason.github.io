<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 72" width="330" height="72" role="img" aria-label="Severo Balason Logo">

  <!-- ── MARK ── -->
  <rect x="0" y="0" width="62" height="62" fill="#0e1117"/>
  <rect x="3.5" y="3.5" width="55" height="55" fill="none" stroke="#5a8ab0" stroke-width="0.6" opacity="0.45"/>

  <!-- Italic serif S -->
  <text x="31" y="46"
    font-family="Georgia,'Times New Roman',serif"
    font-size="40" font-style="italic" font-weight="600"
    fill="#ffffff" text-anchor="middle">S</text>

  <!-- Accent B -->
  <text x="47.5" y="55"
    font-family="Georgia,'Times New Roman',serif"
    font-size="13" font-weight="400" font-style="normal"
    fill="#5a8ab0" text-anchor="middle">B</text>

  <!-- ── DIVIDER ── -->
  <line x1="80" y1="10" x2="80" y2="54" stroke="#dedad4" stroke-width="0.7"/>

  <!-- ── WORDMARK ── -->
  <text x="96" y="29"
    font-family="Arial,Helvetica,sans-serif"
    font-size="14.5" font-weight="700"
    fill="#0e1117" letter-spacing="6">SEVERO</text>

  <text x="96" y="49"
    font-family="Arial,Helvetica,sans-serif"
    font-size="14.5" font-weight="300"
    fill="#0e1117" letter-spacing="6">BALASON</text>

  <!-- Accent rule -->
  <line x1="96" y1="55.5" x2="327" y2="55.5" stroke="#3d6b8f" stroke-width="0.75"/>

  <!-- Tagline -->
  <text x="96" y="66"
    font-family="Arial,Helvetica,sans-serif"
    font-size="6.5" font-weight="400"
    fill="#8a8a94" letter-spacing="5.5">VIRTUAL ASSISTANT</text>

</svg>
